<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
    <div class="max-w-4xl mx-auto space-y-8">
        <div class="bg-white p-6 rounded-xl shadow-md">
            <h1 class="text-xl font-bold mb-4">回報新錯誤</h1>
            <form id="bugForm" action="https://github.com/您的帳號/您的倉庫名稱/issues/new" method="GET" class="space-y-3">
                <input type="text" name="title" placeholder="錯誤標題" class="w-full border p-2 rounded">
                <textarea name="body" placeholder="錯誤說明與正確代碼..." class="w-full border p-2 rounded h-24"></textarea>
                <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">提交至 GitHub</button>
            </form>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md">
            <h2 class="text-xl font-bold mb-4">已回報的錯誤列表</h2>
            <div id="issueList" class="divide-y">
                <p class="text-gray-500">正在讀取錯誤列表...</p>
            </div>
        </div>
    </div>

    <script>
        async function fetchIssues() {
            const res = await fetch('https://api.github.com/repos/您的帳號/您的倉庫名稱/issues');
            const issues = await res.json();
            const list = document.getElementById('issueList');
            list.innerHTML = issues.map(issue => `
                <div class="py-3">
                    <h3 class="font-semibold">${issue.title}</h3>
                    <p class="text-sm text-gray-600">${issue.body.substring(0, 100)}...</p>
                </div>
            `).join('');
        }
        fetchIssues();
    </script>
</body>
</html>
