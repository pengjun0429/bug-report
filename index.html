<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>程式錯誤回報系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-lg">
        <h1 class="text-2xl font-bold mb-6 text-gray-800">程式錯誤回報系統</h1>
        <form action="https://github.com/您的帳號/您的倉庫名稱/issues/new" method="GET" class="space-y-4">
            <div>
                <label class="block text-sm font-medium">錯誤標題</label>
                <input type="text" name="title" class="w-full border rounded p-2" required>
            </div>
            <div>
                <label class="block text-sm font-medium">嚴重程度</label>
                <select name="labels" class="w-full border rounded p-2">
                    <option value="bug,低">低</option>
                    <option value="bug,中">中</option>
                    <option value="bug,高">高</option>
                    <option value="bug,緊急">緊急</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium">錯誤描述與正確代碼</label>
                <textarea name="body" class="w-full border rounded p-2 h-40 font-mono text-sm" placeholder="請詳細說明問題並貼上正確程式碼..."></textarea>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">提交至 GitHub 回報</button>
        </form>
    </div>
</body>
</html>
